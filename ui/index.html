<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NeonGroove 音乐播放器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <header class="hero">
      <div class="titles">
        <p class="eyebrow">NEONGROOVE · WEB UI</p>
        <h1>霓虹风音乐播放器</h1>
        <p class="lede">HTML + CSS + JavaScript 打造的现代化界面，支持文件夹一键导入、播放控制、进度拖动与音量调节。</p>
        <div class="actions">
          <button id="choose-folder" class="primary">选择音乐文件夹</button>
          <span id="folder-label" class="muted">尚未选择音乐目录</span>
        </div>
      </div>
      <div class="status">
        <div class="now-playing">
          <p class="muted">当前曲目</p>
          <h2 id="current-title">未播放</h2>
          <p id="time-meta" class="muted">00:00 / 00:00</p>
        </div>
        <div class="chips">
          <span class="chip" id="chip-total">曲目 · 0</span>
          <span class="chip" id="chip-state">状态 · 空闲</span>
          <span class="chip" id="chip-volume">音量 · 75%</span>
        </div>
      </div>
    </header>

    <main class="layout">
      <section class="card playlist-card">
        <div class="card-head">
          <h3>播放列表</h3>
          <span class="muted">点击曲目即可播放</span>
        </div>
        <div id="playlist" class="playlist"></div>
      </section>

      <section class="card control-card">
        <div class="control-row">
          <button id="btn-prev">⏮ 上一曲</button>
          <button id="btn-play">▶ 播放/暂停</button>
          <button id="btn-next">⏭ 下一曲</button>
          <button id="btn-stop">⏹ 停止</button>
        </div>

        <div class="slider-row">
          <label>进度</label>
          <input type="range" id="progress" min="0" max="100" step="0.5" value="0" />
          <div class="slider-meta">
            <span id="progress-text">00:00 / 00:00</span>
            <button id="btn-refresh" class="ghost">↻ 刷新状态</button>
          </div>
        </div>

        <div class="slider-row">
          <label>音量</label>
          <input type="range" id="volume" min="0" max="1" step="0.01" value="0.75" />
        </div>

        <div id="toast" class="toast" hidden></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
