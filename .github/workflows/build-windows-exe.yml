name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    env:
      WINDOWS_CODESIGN_CERT_BASE64: ${{ secrets.WINDOWS_CODESIGN_CERT_BASE64 }}
      WINDOWS_CODESIGN_CERT_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_CERT_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --noconsole --onefile --add-data "ui;ui" --name NeonGroove music_player.py

      - name: Decode code signing certificate
        if: env.WINDOWS_CODESIGN_CERT_BASE64 != ''
        env:
          WINDOWS_CODESIGN_CERT_BASE64: ${{ secrets.WINDOWS_CODESIGN_CERT_BASE64 }}
        run: |
          $bytes = [System.Convert]::FromBase64String("$env:WINDOWS_CODESIGN_CERT_BASE64")
          Set-Content -Path signing-cert.pfx -Value $bytes -Encoding Byte

      - name: Sign executable (optional)
        if: env.WINDOWS_CODESIGN_CERT_BASE64 != ''
        env:
          WINDOWS_CODESIGN_CERT_BASE64: ${{ secrets.WINDOWS_CODESIGN_CERT_BASE64 }}
          WINDOWS_CODESIGN_CERT_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_CERT_PASSWORD }}
        run: |
          signtool sign `
            /fd sha256 `
            /td sha256 `
            /tr http://timestamp.digicert.com `
            /f signing-cert.pfx `
            /p "$env:WINDOWS_CODESIGN_CERT_PASSWORD" `
            dist/NeonGroove.exe

      - name: Bundle artifact
        run: |
          New-Item -ItemType Directory -Path upload -Force | Out-Null
          Copy-Item dist/NeonGroove.exe upload/
          Compress-Archive -Path upload/NeonGroove.exe -DestinationPath upload/NeonGroove.zip -Force

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeonGroove-exe
          path: upload/NeonGroove.zip
          retention-days: 14
          if-no-files-found: error
