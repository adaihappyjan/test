name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --noconsole --onefile --add-data "ui;ui" --name NeonGroove music_player.py

      - name: Bundle artifact
        run: |
          New-Item -ItemType Directory -Path upload -Force | Out-Null
          Copy-Item dist/NeonGroove.exe upload/
          Compress-Archive -Path upload/NeonGroove.exe -DestinationPath upload/NeonGroove.zip -Force

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeonGroove-exe
          path: upload/NeonGroove.zip
          retention-days: 14
          if-no-files-found: error
